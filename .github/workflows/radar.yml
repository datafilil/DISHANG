name: ETF Radar Scheduler

on:
  schedule:
    # 这里的 cron 表达式代表：北京时间每周一至周五 下午 15:30 运行
    # GitHub 使用 UTC 时间，北京时间 = UTC + 8
    - cron: '30 7 * * 1-5' 
  
  # 允许手动点击运行（方便测试）
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install akshare pandas requests google-generativeai
      
      - name: Run Radar Script
        env:
          # 这里将 Secrets 映射为环境变量供 Python 读取
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERVER_PUSH_KEY: ${{ secrets.SERVER_PUSH_KEY }}
        run: python radar.py
