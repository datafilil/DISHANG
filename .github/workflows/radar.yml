name: ETF Radar Scheduler

on:
  schedule:
    # 这里的 cron 表达式代表：UTC时间 每周一至周五 01:30 运行
    # 对应北京时间 (UTC+8) = 每周一至周五 上午 9:30
    # 这个时间点网络较稳，且能保证您在当天任何时间查看到结果
    - cron: '30 1 * * 1-5' 
  
  # 允许手动点击运行（方便测试）
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码 (已升级为 v4)
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境 (已升级为 v5)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # 3. 安装依赖库（使用锁定版本，避免CI环境漂移）
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # 4. 运行雷达脚本
      - name: Run Radar Script
        env:
          # 这里将 Secrets 映射为环境变量供 Python 读取
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERVER_PUSH_KEY: ${{ secrets.SERVER_PUSH_KEY }}
        run: python radar.py
